name: Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    # Match the org-wide runner standard set by sonarmd/workflows ci-core
    # (PR #48): arm64 native, no cross-arch emulation.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Pinned to the version in .node-version (matches AuraPlatform's
          # engines pin). Update both together.
          node-version: '22.18.0'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@sonarmd'

      - run: npm ci

      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
